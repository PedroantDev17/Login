<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="nakamura.0" type="image/x-icon">
    <link rel="stylesheet" href="Cadastro.css">
</head>
<body onload="carregar()">
    <div id="cadastro">
      <h1>Login</h1>
        <form id="form-login" onsubmit="event.preventDefault(); enviar();" autocomplete="off">  
            
            <fieldset>
                <legend>Cadastro</legend>
                <section>
                    <p class="nome">
                        <label for="inome">Nome:</label>
                        <input type="text" name="nome" id="inome" min="5" max="50" autocomplete="name" required>
                    </p>
                    <p>
                        <label for="iemail">Email:</label>
                        <input type="email" name="email" id="iemail"  min="10" max="256" autocomplete="email" pattern="@" required>
                    </p>
                    <p>
                        <label for="isenha">Senha:</label>
                        <input type="password" name="senha" id="isenha" minlength="6" maxlength="10" required>
                    </p>
                
                    <input type="button" value="Enviar" class="enviar" onclick="enviar()">
                    <input type="reset" value="Limpar" class="limpar">
                </section>
                
            </fieldset>
        </form>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
